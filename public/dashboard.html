<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RU Chatbot - Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-top">
        <h2>Agent Mode</h2>
        <button id="agentModeBtn" class="sidebar-btn">Agentic Mode: Off</button>
        <button id="newChatBtn" class="sidebar-btn">+ New Chat</button>
      </div>

      <div class="sidebar-section">
        <h3>Past Chats</h3>
        <input type="text" id="chatSearch" class="sidebar-search" placeholder="Search chats..." />
        <ul id="chatList" class="chat-list"></ul>
      </div>
    </aside>

    <section class="main-panel">
      <header class="dashboard-header">
        <div>
          <p class="page-tag">Landing page after sign in</p>
          <h1>Ask me anything</h1>
        </div>

        <div class="header-actions">
          <div class="profile-badge">U</div>
          <button id="logoutBtn" class="btn btn-danger small-btn">Logout</button>
        </div>
      </header>

      <main class="chat-area">
        <div id="chatWindow" class="chat-window">
          <div class="chat-message bot-message">
            Welcome. Start a conversation by typing a message below.
          </div>
        </div>

        <div class="chat-controls">
          <div class="chat-input-row">
            <label for="chatInput" class="chat-input-label">Start Chat:</label>
            <input
              type="text"
              id="chatInput"
              class="chat-input"
              placeholder="Ask me for a recipe"
            />
            <button id="sendBtn" class="btn small-btn">Send</button>
          </div>

          <div class="utility-row">
            <div class="token-box">
              Token count: <span id="tokenCount">0</span>
            </div>

            <div class="language-box">
              <label for="languageSelect">Choose Language</label>
              <select id="languageSelect">
                <option value="english">English</option>
                <option value="spanish">Spanish</option>
                <option value="french">French</option>
              </select>
            </div>
          </div>
        </div>
      </main>

      <footer class="dashboard-footer">
        <a href="terms.html" target="_blank">Terms &amp; Conditions</a>
      </footer>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
